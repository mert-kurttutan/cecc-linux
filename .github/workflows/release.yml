name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: excalibur-control-center

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      ASSET_DIR: ../release-assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: excalibur-control-center

      - name: Build release binaries
        run: |
          cargo build --release \
            -p excalibur-control-center-gui \
            -p excalibur-control-center-cli

      - name: Prepare release assets
        run: |
          mkdir -p "$ASSET_DIR"
          install -m 0755 target/release/excalibur-control-center-gui \
            "$ASSET_DIR/excalibur-control-center-gui"
          install -m 0755 target/release/excalibur-control-center-cli \
            "$ASSET_DIR/excalibur-control-center-cli"
          sha256sum "$ASSET_DIR"/excalibur-control-center-* \
            > "$ASSET_DIR/SHA256SUMS"

      - name: Create release if needed
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes "Release $RELEASE_TAG"
          fi

      - name: Upload release assets
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" release-assets/* --clobber
