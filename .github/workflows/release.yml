name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: excalibur-control-center

    env:
      ASSET_DIR: release-assets
      NFPM_VERSION: 2.47.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read release version
        run: |
          python3 - <<'PY' >> "$GITHUB_ENV"
          import pathlib
          import sys
          import tomllib

          crates = {
              "gui": pathlib.Path("gui/Cargo.toml"),
              "cli": pathlib.Path("cli/Cargo.toml"),
              "backend": pathlib.Path("backend/Cargo.toml"),
          }
          versions = {
              name: tomllib.loads(path.read_text())["package"]["version"]
              for name, path in crates.items()
          }
          gui_version = versions["gui"]
          mismatches = {
              name: version
              for name, version in versions.items()
              if version != gui_version
          }
          if mismatches:
              print(f"Version mismatch: {versions}", file=sys.stderr)
              sys.exit(1)

          print(f"RELEASE_VERSION={gui_version}")
          print(f"RELEASE_TAG=v{gui_version}")
          PY

      - name: Check existing release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists. Refusing to overwrite assets."
            echo "Bump the Cargo package version before creating a new release."
            exit 1
          fi
          echo "Release $RELEASE_TAG will be created."

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: excalibur-control-center

      - name: Build release binaries
        run: |
          cargo build --release \
            -p excalibur-control-center-gui \
            -p excalibur-control-center-cli

      - name: Prepare release assets
        run: |
          mkdir -p "../$ASSET_DIR"
          install -m 0755 target/release/excalibur-control-center-gui \
            "../$ASSET_DIR/excalibur-control-center-gui"
          install -m 0755 target/release/excalibur-control-center-cli \
            "../$ASSET_DIR/excalibur-control-center-cli"

      - name: Install nFPM
        working-directory: .
        run: |
          curl -fsSL \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build Linux packages
        working-directory: .
        run: |
          python3 - <<'PY'
          import os
          import pathlib

          source = pathlib.Path("packaging/nfpm.yaml")
          target = pathlib.Path("packaging/nfpm.release.yaml")
          target.write_text(source.read_text().replace("__VERSION__", os.environ["RELEASE_VERSION"]))
          PY
          nfpm package \
            --config packaging/nfpm.release.yaml \
            --packager deb \
            --target "$ASSET_DIR"
          nfpm package \
            --config packaging/nfpm.release.yaml \
            --packager rpm \
            --target "$ASSET_DIR"

      - name: Generate checksums
        working-directory: .
        run: |
          sha256sum "$ASSET_DIR"/* \
            > "$ASSET_DIR/SHA256SUMS"

      - name: Create release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --notes "Release $RELEASE_TAG"

      - name: Upload release assets
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" release-assets/*
