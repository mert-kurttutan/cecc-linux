<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 430">
  <defs>
    <radialGradient id="backdrop" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e252d" stop-opacity="0.95"/>
      <stop offset="62%" stop-color="#111820" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#05080c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="performance-fill" x1="150" y1="70" x2="370" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.50"/>
      <stop offset="58%" stop-color="#f97316" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0.42"/>
    </linearGradient>
    <filter id="soft-glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="520" height="430" fill="none"/>
  <circle cx="260" cy="215" r="190" fill="url(#backdrop)"/>

  <g fill="none" stroke="#29313a" stroke-width="1">
    <polygon points="260,55 412,166 354,345 166,345 108,166"/>
    <polygon points="260,87 382,176 336,319 184,319 138,176"/>
    <polygon points="260,119 351,185 318,292 202,292 169,185"/>
    <polygon points="260,151 321,195 301,266 219,266 199,195"/>
    <polygon points="260,183 290,205 283,239 237,239 230,205"/>
  </g>

  <g stroke="#6b7280" stroke-width="1.2" stroke-opacity="0.75">
    <line x1="260" y1="215" x2="260" y2="55"/>
    <line x1="260" y1="215" x2="412" y2="166"/>
    <line x1="260" y1="215" x2="354" y2="345"/>
    <line x1="260" y1="215" x2="166" y2="345"/>
    <line x1="260" y1="215" x2="108" y2="166"/>
  </g>

  <polygon
    points="260,86 392,172 342,328 178,328 129,172"
    fill="#7c4a1d"
    fill-opacity="0.54"
    stroke="#f97316"
    stroke-width="3"
    filter="url(#soft-glow)"
  />

  <polygon
    points="260,145 315,197 300,278 220,278 198,199"
    fill="url(#performance-fill)"
    stroke="#f59e0b"
    stroke-width="2"
    stroke-opacity="0.72"
  />

  <g fill="#f8fafc" stroke="#cbd5e1" stroke-width="1">
    <circle cx="260" cy="55" r="4"/>
    <circle cx="412" cy="166" r="4"/>
    <circle cx="354" cy="345" r="4"/>
    <circle cx="166" cy="345" r="4"/>
    <circle cx="108" cy="166" r="4"/>
  </g>

  <g font-family="Inter, DejaVu Sans, Arial, sans-serif" font-size="20" fill="#f8fafc">
    <text x="260" y="32" text-anchor="middle">Noise Reduction</text>
    <text x="430" y="173">Energy Saving</text>
    <text x="366" y="378">CPU Performance</text>
    <text x="154" y="378" text-anchor="end">GPU Performance</text>
    <text x="90" y="173" text-anchor="end">Cooling</text>
  </g>
</svg>
